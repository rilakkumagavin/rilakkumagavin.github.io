(()=>{
const D=window.MATH_RPG_DATA,KEY="math-kingdom-rpg-v2";
let state=JSON.parse(localStorage.getItem(KEY)||'{"completed":[],"errors":[],"repaired":[],"answers":{},"notes":{},"introSeen":false}');
let screen=state.introSeen?"map":"home",current=0,hintLevel=0,selected=null,sequence=[],tenths=0,tiles=0;
const app=document.getElementById("app")||document.body.appendChild(Object.assign(document.createElement("div"),{id:"app"}));
const save=()=>localStorage.setItem(KEY,JSON.stringify(state));
const done=id=>state.completed.includes(id);
const regionDone=id=>D.lessons.filter(x=>x.region===id).every(x=>done(x.id));
function title(){let count=D.regions.filter(x=>regionDone(x.id)).length;return count===5?"數學王國守護者":count?D.regions[count-1].title:D.hero}
function shell(content){app.innerHTML=`<header class="top"><div class="brand"><span>🦉</span><div><b>${D.title}</b><small>${title()}</small></div></div><div class="status">智慧道具 ${state.completed.length}/15</div></header>${content}`}
function render(){if(screen==="home")home();if(screen==="map")map();if(screen==="lesson")lesson();if(screen==="reward")reward();if(screen==="dungeons")dungeons();if(screen==="collection")collection();if(screen==="report")report();if(screen==="cards")cards()}
function home(){shell(`<main class="home"><section class="story-card"><div class="owl">🦉</div><p class="eyebrow">智慧貓頭鷹米米的召集令</p><h1>${D.title}</h1><p>${D.intro}</p><div class="world-list">${D.regions.map(r=>`<span style="--c:${r.color}">${r.name}<small>${r.unit}</small></span>`).join("")}</div><button class="primary" id="enter">成為數學任務冒險家</button></section></main>`);document.getElementById("enter").onclick=()=>{state.introSeen=true;save();screen="map";render()}}
function map(){
 const positions=[[12,68],[24,49],[35,68],[42,40],[51,57],[58,28],[66,46],[74,22],[80,56],[88,35],[78,76],[62,78],[45,83],[28,84],[12,87]];
 const nodes=D.lessons.map((l,i)=>{let unlocked=i===0||done(D.lessons[i-1].id),isDone=done(l.id);return `<button class="node ${isDone?"done":unlocked?"active":"locked"}" style="--x:${positions[i][0]}%;--y:${positions[i][1]}%" data-stage="${i}" ${unlocked?"":"disabled"}><i>${isDone?l.icon:unlocked?"✨":"🔒"}</i><b>${i+1}</b><span>${l.title}</span></button>`}).join("");
 const path=positions.map(p=>p.join(",")).join(" ");
 shell(`<main class="map-wrap"><section class="map"><div class="map-bg"></div><div class="map-title"><span>RPG 冒險地圖</span><h1>五大智慧試煉</h1><p>沿著發光路線找回十五件知識道具。</p></div><svg viewBox="0 0 100 100" preserveAspectRatio="none"><polyline points="${path}"/></svg>${D.regions.map((r,i)=>`<div class="region r${i+1}" style="--c:${r.color}"><b>${r.name}</b><small>${r.unit}</small></div>`).join("")}${nodes}<div class="hero-token">🧙</div></section><nav class="dock"><button data-go="dungeons">⚔️ 錯題副本 <em>${recommendedDungeons().length}</em></button><button data-go="collection">🎒 徽章收藏</button><button data-go="report">📊 離線診斷</button><button data-go="cards">📜 成果卡</button></nav></main>`);
 document.querySelectorAll("[data-stage]:not(:disabled)").forEach(b=>b.onclick=()=>{current=+b.dataset.stage;hintLevel=0;selected=null;sequence=[];tenths=0;tiles=0;screen="lesson";render()});
 document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{screen=b.dataset.go;render()});
}
function visual(l){
 if(l.type==="sequence")return `<div class="sequence-bank">${l.options.map((x,i)=>`<button data-seq="${i}" class="${sequence.includes(i)?"used":""}">${x}</button>`).join("")}</div><div class="sequence-slots">${[0,1].map((_,i)=>`<div>${sequence[i]!==undefined?l.options[sequence[i]]:`第${i+1}步`}</div>`).join("")}</div>`;
 if(l.type==="tenths")return `<div class="ten-bars">${Array.from({length:20},(_,i)=>`<button data-tenth="${i}" class="${i<tenths?"on":""}"></button>`).join("")}</div><div class="readout">${tenths} 個 0.1 ＝ <strong>${(tenths/10).toFixed(1)}</strong></div>`;
 if(l.type==="clock")return `<div class="clock"><span class="hand minute seven"></span><span class="hand hour"></span><i></i>${Array.from({length:12},(_,i)=>`<b style="--a:${(i+1)*30}deg">${i+1}</b>`).join("")}</div>`;
 if(l.type==="timeline")return `<div class="timeline"><span>10:17</span><i style="width:42%"></i><span>10:42</span></div>`;
 if(l.type==="inverse")return `<div class="gear"><span>24</span><b>÷4</b><span>6</span><strong>↔</strong></div>`;
 if(l.type==="unknown")return `<div class="balance"><span>□ ÷ 25</span><b>＝</b><span>3</span></div>`;
 if(l.type==="cover")return `<div class="tile-grid">${Array.from({length:12},(_,i)=>`<button data-tile="${i}" class="${i<tiles?"on":""}"></button>`).join("")}</div><p class="center">已覆蓋 <b>${tiles}</b> 平方公分</p>`;
 if(l.type==="array")return `<div class="array-grid">${Array.from({length:12},()=>"<i></i>").join("")}</div><p class="center">4排，每排3格</p>`;
 if(l.type==="halves")return `<div class="halves">${Array.from({length:6},()=>"<i></i>").join("")}<i class="half"></i><i class="half flip"></i></div>`;
 if(l.type==="decimal")return `<div class="decimal-board"><span>5.0</span><b>－</b><span>1.4</span><hr><strong>？</strong></div>`;
 if(l.type==="dayline")return `<div class="dayline">${["0時","6時","12時","15時","18時","24時"].map(x=>`<span>${x}</span>`).join("")}</div>`;
 if(l.type==="convert")return `<div class="cogs"><i>60分</i><b>×2</b><i>＋30分</i></div>`;
 if(l.type==="layers")return `<div class="layers"><span>4排</span><b>→</b><span>每排6張</span><b>→</b><span>每張2人</span></div>`;
 if(l.type==="estimate")return `<div class="estimate"><del>198</del><strong>≈ 200</strong><b>× 4</b></div>`;
 if(l.type==="compare")return `<div class="compare"><span>3.8</span><b>？</b><span>3.5</span></div>`;
 return "";
}
function lesson(){
 const l=D.lessons[current],h=hintLevel?l.hints[hintLevel-1]:"需要幫忙時，可逐層查看提示。";
 let choices=l.options&&!Array.isArray(l.answer)?`<div class="choices">${l.options.map((x,i)=>`<button data-answer="${i}" class="${selected===i?"selected":""}">${String.fromCharCode(65+i)}　${x}</button>`).join("")}</div>`:"";
 shell(`<main class="lesson-page" style="--region:${D.regions.find(r=>r.id===l.region).color}"><button class="back" id="back">← 冒險地圖</button><section class="lesson-card"><header><span>${l.icon}</span><div><small>${l.concept}</small><h1>第${current+1}關：${l.title}</h1><p>${l.objective}</p></div></header><div class="npc"><b>🦉 米米：</b>${l.npc}</div><section class="mission"><h2>${l.prompt}</h2>${visual(l)}${choices}<div class="reason"><label>我的理由（可選填）<textarea id="reason" placeholder="我先觀察到……所以我判斷……">${state.notes[l.id]||""}</textarea></label></div><div class="hint ${hintLevel?"show":""}">💡 ${h}</div><div class="actions"><button id="hint">提示 ${Math.min(hintLevel+1,3)}/3</button><button class="primary" id="check">完成判斷</button></div><p id="feedback"></p></section></section></main>`);
 document.getElementById("back").onclick=()=>{screen="map";render()};document.getElementById("hint").onclick=()=>{hintLevel=Math.min(3,hintLevel+1);render()};
 document.querySelectorAll("[data-answer]").forEach(b=>b.onclick=()=>{selected=+b.dataset.answer;render()});
 document.querySelectorAll("[data-seq]").forEach(b=>b.onclick=()=>{let n=+b.dataset.seq;if(!sequence.includes(n)){sequence.push(n);render()}});
 document.querySelectorAll("[data-tenth]").forEach(b=>b.onclick=()=>{tenths=+b.dataset.tenth+1;render()});
 document.querySelectorAll("[data-tile]").forEach(b=>b.onclick=()=>{tiles=+b.dataset.tile+1;render()});
 document.getElementById("check").onclick=()=>checkLesson(l);
}
function checkLesson(l){
 state.notes[l.id]=document.getElementById("reason").value.trim();let ok=false,answer="";
 if(l.type==="sequence"){ok=JSON.stringify(sequence)===JSON.stringify(l.answer);answer=sequence.map(i=>l.options[i]).join(" → ")}
 else if(l.type==="tenths"){ok=tenths===13;answer=(tenths/10).toFixed(1)}
 else if(l.type==="cover"){ok=tiles===6;answer=tiles}
 else{ok=selected===l.answer;answer=selected===null?"未作答":l.options[selected]}
 state.answers[l.id]={answer,ok,time:Date.now()};if(!ok){state.errors.push({lesson:l.id,answer,time:Date.now()});hintLevel=Math.min(3,hintLevel+1);save();document.getElementById("feedback").innerHTML=`<strong>迷思怪物出現：</strong>${l.misconception} 請查看提示後再試一次。`;document.getElementById("feedback").className="bad";return}
 if(!done(l.id))state.completed.push(l.id);save();screen="reward";render();
}
function reward(){let l=D.lessons[current];shell(`<main class="reward-page"><section><div class="reward-icon">${l.icon}</div><p>任務完成，知識道具已收入背包</p><h1>獲得「${l.reward}」</h1><div class="learned"><b>我學會了</b><p>${l.learned}</p></div><div class="fix"><b>迷思修正</b><p>${l.misconception}</p></div><button class="primary" id="map">回到冒險地圖</button></section></main>`);document.getElementById("map").onclick=()=>{screen="map";render()}}
function recommendedDungeons(){let ids=new Set();state.errors.forEach(e=>(D.diagnosisRules[e.lesson]||[]).forEach(id=>ids.add(id)));return [...ids]}
function dungeons(){let rec=recommendedDungeons();shell(`<main class="subpage"><header><button class="back" id="back">← 地圖</button><p class="eyebrow">錯題補救區</p><h1>迷思怪物副本</h1><p>系統只依作答紀錄套用離線規則，不連接外部AI。</p></header><div class="dungeon-grid">${D.errorDungeons.map(d=>`<article class="${rec.includes(d.id)?"recommended":""}"><span>${d.icon}</span>${rec.includes(d.id)?"<em>建議挑戰</em>":""}<small>${d.unit}</small><h2>${d.title}</h2><p><b>怪物：</b>${d.monster}</p><p><b>修復操作：</b>${d.concept}</p><details><summary>查看正確觀念</summary>${d.correct}</details><button data-repair="${d.id}">${state.repaired.includes(d.id)?"✓ 已修復":"完成修復"}</button></article>`).join("")}</div></main>`);bindBack();document.querySelectorAll("[data-repair]").forEach(b=>b.onclick=()=>{if(!state.repaired.includes(b.dataset.repair))state.repaired.push(b.dataset.repair);save();render()})}
function collection(){shell(`<main class="subpage"><header><button class="back" id="back">← 地圖</button><p class="eyebrow">冒險背包</p><h1>知識道具與徽章</h1></header><div class="badge-grid">${D.lessons.map((l,i)=>`<article class="${done(l.id)?"got":""}"><span>${done(l.id)?l.icon:"🔒"}</span><small>第${i+1}關</small><b>${done(l.id)?l.reward:"尚未取得"}</b></article>`).join("")}</div></main>`);bindBack()}
function report(){let wrong=D.lessons.filter(l=>state.answers[l.id]&&!state.answers[l.id].ok),rec=recommendedDungeons();shell(`<main class="subpage report"><header><button class="back" id="back">← 地圖</button><p class="eyebrow">規則式離線推估</p><h1>錯誤診斷報告</h1><p>依錯題與 diagnosisRules 找出優先修復副本，不宣稱為正式能力鑑定。</p></header><div class="report-stats"><span><b>${state.completed.length}</b>完成關卡</span><span><b>${state.errors.length}</b>錯誤紀錄</span><span><b>${state.repaired.length}</b>已修復副本</span></div><section class="report-list"><h2>優先複習</h2>${rec.length?rec.map(id=>{let d=D.errorDungeons.find(x=>x.id===id);return `<p>${d.icon} <b>${d.title}</b>：${d.concept}</p>`}).join(""):"<p>目前沒有被規則標記的優先副本。</p>"}<h2>最近需要注意的關卡</h2>${wrong.length?wrong.map(l=>`<p>${l.icon} ${l.title}：${l.misconception}</p>`).join(""):"<p>已完成題目目前沒有保留中的錯誤答案。</p>"}</section></main>`);bindBack()}
function cards(){let learned=D.lessons.filter(l=>done(l.id)).map(l=>l.learned);let recent=state.errors.at(-1),dungeon=recent?(D.diagnosisRules[recent.lesson]||[])[0]:null,d=dungeon&&D.errorDungeons.find(x=>x.id===dungeon);shell(`<main class="subpage cards"><header class="no-print"><button class="back" id="back">← 地圖</button><p class="eyebrow">可列印學習成果</p><h1>五大智慧試煉成果卡</h1></header><section class="final-card"><h1>數學冒險成果卡</h1><label>學生姓名<input placeholder="請填寫姓名"></label><dl><dt>完成關卡</dt><dd>${state.completed.length}/15</dd><dt>獲得徽章</dt><dd>${D.lessons.filter(l=>done(l.id)).map(l=>l.reward).join("、")||"尚未取得"}</dd><dt>我學會的概念</dt><dd>${learned.join("；")||"完成關卡後自動列出"}</dd><dt>代表題</dt><dd>${state.completed.length?D.lessons[state.completed.length-1].prompt:"完成關卡後由系統選取"}</dd></dl>${["我的解題方法","我修正後的想法","教師回饋"].map(x=>`<label>${x}<textarea></textarea></label>`).join("")}</section><section class="final-card"><h1>迷思修復卡</h1><dl><dt>錯誤怪物</dt><dd>${d?.monster||"目前沒有診斷紀錄"}</dd><dt>修復副本</dt><dd>${d?.title||"尚未啟動"}</dd><dt>正確觀念</dt><dd>${d?.correct||"完成錯題副本後帶入"}</dd><dt>修復徽章</dt><dd>${d?.reward||"尚未取得"}</dd></dl>${["我原本怎麼想","我操作了什麼"].map(x=>`<label>${x}<textarea></textarea></label>`).join("")}</section><div class="card-actions no-print"><button class="primary" id="print">列印／另存PDF</button></div></main>`);bindBack();document.getElementById("print").onclick=()=>window.print()}
function bindBack(){document.getElementById("back").onclick=()=>{screen="map";render()}}
render();
})();

  </script>
</body>
</html>
